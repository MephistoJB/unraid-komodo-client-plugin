name: Validate

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate shell scripts
        run: find scripts src -type f \( -name '*.sh' -o -name 'rc.*' \) -print0 | xargs -0 -n1 bash -n

      - name: Install PHP CLI
        run: sudo apt-get update && sudo apt-get install -y php-cli libxml2-utils

      - name: Build bundle and metadata
        run: |
          bash ./scripts/build-bundle.sh
          bash ./scripts/render-metadata.sh

      - name: Validate PHP page
        run: php -l src/usr/local/emhttp/plugins/komodo-periphery/KomodoPeriphery.page

      - name: Validate XML outputs
        run: |
          xmllint --noout komodo-periphery.plg
          xmllint --noout komodo-periphery.xml

